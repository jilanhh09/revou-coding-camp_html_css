<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Page</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-600 via-pink-500 to-orange-400 flex items-center justify-center p-8">

    <div class="w-full max-w-2xl space-y-6">

        <!-- Title -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white drop-shadow-lg tracking-wide">HTML Lists</h1>
            <p class="text-white/70 mt-2 text-sm">Styled with Tailwind CSS v4 + Glassmorphism</p>
        </div>

        <!-- Unordered List Card -->
        <div class="glass rounded-2xl p-6 shadow-xl">
            <div class="flex items-center gap-3 mb-4">
                <span class="text-2xl">🍉</span>
                <h2 class="text-xl font-semibold text-white">Unordered List (UL)</h2>
            </div>
            <ul class="space-y-3">
                <li class="flex items-center gap-3 bg-white/10 rounded-xl px-4 py-3 text-white hover:bg-white/20 transition-all duration-200">
                    <span class="w-2 h-2 rounded-sm bg-yellow-300 inline-block"></span>
                    Mangga
                </li>
                <li class="flex items-center gap-3 bg-white/10 rounded-xl px-4 py-3 text-white hover:bg-white/20 transition-all duration-200">
                    <span class="w-2 h-2 rounded-full bg-pink-300 inline-block"></span>
                    Jambu
                </li>
                <li class="flex items-center gap-3 bg-white/10 rounded-xl px-4 py-3 text-white hover:bg-white/20 transition-all duration-200">
                    <span class="w-2 h-2 rounded-full bg-orange-300 inline-block"></span>
                    Pepaya
                </li>
            </ul>
        </div>

        <!-- Ordered List Card -->
        <div class="glass rounded-2xl p-6 shadow-xl">
            <div class="flex items-center gap-3 mb-4">
                <span class="text-2xl">📋</span>
                <h2 class="text-xl font-semibold text-white">Ordered List (OL)</h2>
                <span class="ml-auto text-white/50 text-sm">How to create a GitHub repo</span>
            </div>
            <ol class="space-y-3">
                <li class="flex items-center gap-4 bg-white/10 rounded-xl px-4 py-3 text-white hover:bg-white/20 transition-all duration-200">
                    <span class="w-7 h-7 rounded-full bg-white/20 flex items-center justify-center text-sm font-bold shrink-0">1</span>
                    Buka Github.com
                </li>
                <li class="flex items-center gap-4 bg-white/10 rounded-xl px-4 py-3 text-white hover:bg-white/20 transition-all duration-200">
                    <span class="w-7 h-7 rounded-full bg-white/20 flex items-center justify-center text-sm font-bold shrink-0">2</span>
                    Klik New Repository
                </li>
                <li class="flex items-center gap-4 bg-white/10 rounded-xl px-4 py-3 text-white hover:bg-white/20 transition-all duration-200">
                    <span class="w-7 h-7 rounded-full bg-white/20 flex items-center justify-center text-sm font-bold shrink-0">3</span>
                    Isi nama repository
                </li>
                <li class="flex items-center gap-4 bg-white/10 rounded-xl px-4 py-3 text-white hover:bg-white/20 transition-all duration-200">
                    <span class="w-7 h-7 rounded-full bg-white/20 flex items-center justify-center text-sm font-bold shrink-0">4</span>
                    Hidupkan README
                </li>
                <li class="flex items-center gap-4 bg-white/10 rounded-xl px-4 py-3 text-white hover:bg-white/20 transition-all duration-200">
                    <span class="w-7 h-7 rounded-full bg-white/20 flex items-center justify-center text-sm font-bold shrink-0">5</span>
                    Klik Create Repository
                </li>
            </ol>
        </div>

    </div>

</body>
</html>
